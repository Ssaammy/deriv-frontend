<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTradingTool</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <!-- Top Navigation -->
  <header class="top-nav">
    <div class="logo">MyTradingTool</div>
    <div class="nav-buttons">
      <button id="loginBtn">Login</button>
      <button id="signupBtn">Sign Up</button>
      <button id="getStartedBtn">Get Started</button>
      <button id="productsBtn">Products</button>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Trade live, powered by Deriv</h1>
    <p>Access live markets, analysis, and trading tools from anywhere.</p>
    <div class="hero-buttons">
      <button id="heroLogin">Login</button>
      <button id="heroSignup">Sign Up</button>
    </div>
    <canvas id="heroChart"></canvas>
  </section>

  <!-- Features / Products -->
  <section class="features">
    <h2>Our Tools & Features</h2>
    <div class="feature-grid">
      <div class="feature-card">Live Market Charts</div>
      <div class="feature-card">Analysis Tools</div>
      <div class="feature-card">Real & Demo Accounts</div>
      <div class="feature-card">Custom Indicators</div>
      <div class="feature-card">Trading History</div>
      <div class="feature-card">Notifications & Alerts</div>
    </div>
  </section>

  <script src="js/account.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/notifications.js"></script>
</body>
</html>
