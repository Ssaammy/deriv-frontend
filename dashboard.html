<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUD Basket Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/chart.css">
</head>
<body>

<header>
  <a href="#" onclick="login()">Log in</a>
  <a href="#" onclick="enterApiToken()">API Token</a>
  <a href="#" onclick="signup()">Sign up</a>
</header>

<div class="container">
  <div class="left-panel">
    <div class="chart-card">
      <div class="current-value">
        <span id="currentVal">940.518</span>
        <span id="percentageChange" style="color:#ef4444;">-0.021 (0.00%)</span>
      </div>
      <canvas id="audChart" class="line-chart"></canvas>

      <div class="percentage-bars" id="percBars"></div>

      <div class="status-bar">
        <span id="botStatus">Bot is not running</span>
        <button class="run-btn" onclick="toggleBot()">Run</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <button onclick="selectMode('Tradingview')">Tradingview</button>
    <button onclick="selectMode('Trading Grid')">Trading Grid</button>
    <hr style="margin:20px 0; border-color:#334155;">
    <div>
      <span>Account:</span>
      <div id="accountInfo">No user logged in</div>
      <button onclick="logout()">Log out</button>
      <br><br>
      <button onclick="switchAccount('demo')">Demo Account</button>
      <button onclick="switchAccount('real')">Real Account</button>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/chart.js"></script>
<script src="js/account.js"></script>
<script src="js/deriv.js"></script>
</body>
</html>
