<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradePro Dashboard</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    /* Sidebar */
    .sidebar{
      width:220px;
      height:100vh;
      background:#020617;
      position:fixed;
      padding:20px;
    }
    .sidebar h2{
      color:#22c55e;
      margin-bottom:30px;
    }
    .sidebar a{
      display:block;
      margin:15px 0;
      color:white;
      text-decoration:none;
    }

    /* Main content */
    .main{
      margin-left:240px;
      padding:40px;
    }

    /* Cards */
    .card{
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-bottom:30px;
    }

    /* API Token Input */
    #apiToken{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:5px;
      border:none;
    }
    #connectTokenBtn{
      padding:10px 20px;
      background:#22c55e;
      border:none;
      border-radius:5px;
      color:white;
      cursor:pointer;
    }

    /* Chart placeholder */
    #chartContainer{
      background:#1e293b;
      border-radius:10px;
      padding:20px;
      margin-bottom:30px;
    }

    /* Responsive for mobile */
    @media(max-width:768px){
      .sidebar{
        width:100%;
        height:auto;
        position:relative;
        padding:15px;
      }
      .main{
        margin-left:0;
        padding:20px;
      }
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>TradePro</h2>
  <a href="#">Dashboard</a>
  <a href="#">Trades</a>
  <a href="#">Statistics</a>
  <a href="#">Account</a>
</div>

<!-- Main content -->
<div class="main">

  <h1>Trading Dashboard</h1>

  <!-- API Token input -->
  <div class="card">
    <h3>Connect Your Deriv Account</h3>
    <input type="text" id="apiToken" placeholder="Enter your Deriv API token">
    <button id="connectTokenBtn" onclick="saveToken()">Connect</button>
  </div>

  <!-- Stats cards -->
  <div class="grid">
    <div class="card">
      <h3>Total Trades</h3>
      <p id="totalTrades">0</p>
    </div>
    <div class="card">
      <h3>Win Rate</h3>
      <p id="winRate">0%</p>
    </div>
    <div class="card">
      <h3>Total Profit</h3>
      <p id="profit">$0</p>
    </div>
  </div>

  <!-- Recent Trades -->
  <div class="card">
    <h2>Recent Trades</h2>
    <div id="trades">No trades yet</div>
  </div>

  <!-- Chart placeholder -->
  <div id="chartContainer" class="card">
    <h2>Live Market Chart (R_100)</h2>
    <canvas id="tradeChart" width="400" height="200"></canvas>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Save API token
  function saveToken(){
    const token = document.getElementById("apiToken").value;
    if(token){
      localStorage.setItem("apiToken", token);
      alert("API token saved successfully!");
      fetchLiveMarketData(token);
    } else {
      alert("Please enter a valid API token");
    }
  }

  // Connect to Deriv WebSocket
  function connectDerivWebSocket(token){
    if(!token){
      alert("Please enter your API token first!");
      return;
    }

    const ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

    ws.onopen = () => {
      console.log("Connected to Deriv WebSocket");

      // Authorize
      ws.send(JSON.stringify({
        authorize: token
      }));

      // Subscribe to ticks for R_100
      ws.send(JSON.stringify({
        ticks: "R_100"
      }));
    };

    ws.onmessage = (msg) => {
      const data = JSON.parse(msg.data);

      // Tick update
      if(data.tick){
        const price = data.tick.ask;
        const time = new Date(data.tick.epoch*1000).toLocaleTimeString();
        updateChart(time, price);
      }

      // Authorization result
      if(data.authorize){
        console.log("Deriv account authorized:", data.authorize);
      }
    };

    ws.onerror = (err) => {
      console.error("WebSocket error:", err);
    };
  }

  // Trigger WebSocket when token is saved
  function fetchLiveMarketData(token){
    console.log("Connecting to Deriv with token:", token);
    connectDerivWebSocket(token);
  }

  // Chart.js setup
  const ctx = document.getElementById('tradeChart').getContext('2d');
  const tradeChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [], // time
      datasets: [{
        label: 'R_100 Price',
        data: [], // live prices
        backgroundColor: 'rgba(34,197,94,0.2)',
        borderColor: 'rgba(34,197,94,1)',
        borderWidth: 2
      }]
    },
    options:{
      responsive:true,
      scales:{
        y:{ beginAtZero:false }
      }
    }
  });

  // Update chart with new tick
  function updateChart(time, price){
    const chart = tradeChart;

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(price);

    // Keep last 30 points
    if(chart.data.labels.length > 30){
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }

    chart.update();
  }

  // Auto-connect if token already saved
  const savedToken = localStorage.getItem("apiToken");
  if(savedToken) fetchLiveMarketData(savedToken);

</script>
</body>
</html>
