<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradePro Live Dashboard</title>
  <style>
    body {margin:0;font-family:Arial,sans-serif;background:#0f172a;color:white;}
    .sidebar{width:220px;height:100vh;background:#020617;position:fixed;padding:20px;}
    .sidebar h2{color:#22c55e;margin-bottom:30px;}
    .sidebar a{display:block;margin:15px 0;color:white;text-decoration:none;}
    .main{margin-left:240px;padding:40px;}
    .card{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:20px;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
    #apiToken,#stake,#duration{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:none;}
    button{padding:10px 20px;background:#22c55e;border:none;border-radius:5px;color:white;cursor:pointer;margin-right:10px;}
    #chartContainer{background:#1e293b;border-radius:10px;padding:20px;margin-bottom:30px;}
    .notification{position:fixed;top:20px;right:20px;padding:15px;border-radius:5px;font-weight:bold;display:none;}
    .success{background:green;color:white;}
    .error{background:red;color:white;}
    @media(max-width:768px){.sidebar{width:100%;height:auto;position:relative;padding:15px;}.main{margin-left:0;padding:20px;}.grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>TradePro</h2>
  <a href="#">Dashboard</a>
  <a href="#">Trades</a>
  <a href="#">Statistics</a>
  <a href="#">Account</a>
</div>

<!-- Main Content -->
<div class="main">
  <h1>Live Deriv Dashboard</h1>

  <!-- API Token -->
  <div class="card">
    <h3>Connect Your Deriv Account</h3>
    <input type="text" id="apiToken" placeholder="Enter your API token">
    <button onclick="saveToken()">Connect</button>
  </div>

  <!-- Trade Controls -->
  <div class="card">
    <h3>Trade Controls</h3>
    <select id="symbolSelector"></select>
    <select id="contractType">
      <option value="CALL">CALL</option>
      <option value="PUT">PUT</option>
    </select>
    <input type="number" id="stake" placeholder="Stake ($)" value="1">
    <input type="number" id="duration" placeholder="Duration (minutes)" value="1">
    <button onclick="openTrade()">Place Trade</button>
  </div>

  <!-- Stats Cards -->
  <div class="grid">
    <div class="card"><h3>Balance</h3><p id="balance">$0</p></div>
    <div class="card"><h3>Total Trades</h3><p id="totalTrades">0</p></div>
    <div class="card"><h3>Win Rate</h3><p id="winRate">0%</p></div>
  </div>

  <!-- Recent Trades -->
  <div class="card">
    <h2>Recent Trades</h2>
    <div id="trades">No trades yet</div>
  </div>

  <!-- Live Charts -->
  <div id="chartContainer" class="card">
    <h2>Live Market Chart</h2>
    <canvas id="tradeChart" width="400" height="200"></canvas>
  </div>

</div>

<!-- Notifications -->
<div id="notif" class="notification"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let ws;
let activeSymbol = "R_100";

// Notifications
function showNotification(msg,type='success'){
  const n = document.getElementById("notif");
  n.innerText = msg;
  n.className = 'notification ' + (type==='success'?'success':'error');
  n.style.display='block';
  setTimeout(()=>{n.style.display='none';},3000);
}

// Save API token
function saveToken(){
  const token = document.getElementById("apiToken").value;
  if(token){
    localStorage.setItem("apiToken", token);
    showNotification("API token saved!");
    connectDeriv(token);
  } else showNotification("Enter a valid API token",'error');
}

// Connect WebSocket and subscribe
function connectDeriv(token){
  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
  ws.onopen = ()=>{
    console.log("Connected to Deriv WS");
    ws.send(JSON.stringify({authorize: token}));
    ws.send(JSON.stringify({active_symbols: "brief"}));
    ws.send(JSON.stringify({ticks: activeSymbol}));
    ws.send(JSON.stringify({portfolio: 1}));
    ws.send(JSON.stringify({balance: 1}));
  };

  ws.onmessage = msg => {
    const data = JSON.parse(msg.data);

    // Active symbols dropdown
    if(data.active_symbols){
      const sel = document.getElementById("symbolSelector");
      sel.innerHTML="";
      data.active_symbols.forEach(s=>{
        const o = document.createElement("option");
        o.value=s.symbol;
        o.text=s.display_name;
        sel.appendChild(o);
      });
      sel.value=activeSymbol;
      sel.onchange = ()=> {activeSymbol=sel.value; subscribeTicks(activeSymbol);}
    }

    // Portfolio
    if(data.portfolio){
      const contracts = data.portfolio.contracts;
      updatePortfolio(contracts);
    }

    // Balance
    if(data.balance){
      document.getElementById("balance").innerText="$"+data.balance.balance;
    }

    // Tick for chart
    if(data.tick){
      updateChart(new Date(data.tick.epoch*1000).toLocaleTimeString(), data.tick.ask);
    }

    // Authorization
    if(data.authorize){
      showNotification("Account authorized ✅");
    }

    // Buy result
    if(data.buy){
      if(data.buy.error){
        showNotification("Trade failed: "+data.buy.error.message,'error');
      } else {
        showNotification("Trade opened! Contract ID: "+data.buy.contract_id);
      }
    }
  };

  ws.onerror=err=>showNotification("WebSocket error",'error');
}

// Subscribe to ticks for selected symbol
function subscribeTicks(symbol){
  ws.send(JSON.stringify({ticks:symbol}));
}

// Portfolio update
function updatePortfolio(contracts){
  let total=contracts.length, wins=0, profit=0;
  const tradesDiv = document.getElementById("trades");
  tradesDiv.innerHTML="";
  contracts.slice(-5).reverse().forEach(c=>{
    const div = document.createElement("div");
    div.innerText=`${c.contract_type} | ${c.symbol} | Stake: $${c.stake} | Profit: $${c.profit||0}`;
    tradesDiv.appendChild(div);
    if(c.profit>0) wins++;
    if(c.profit) profit+=c.profit;
  });
  document.getElementById("totalTrades").innerText=total;
  document.getElementById("winRate").innerText=total>0?((wins/total)*100).toFixed(2)+"%":0+"%";
  document.getElementById("profit").innerText="$"+profit.toFixed(2);
}

// Place trade
function openTrade(){
  if(!ws||ws.readyState!==1){showNotification("WebSocket not connected",'error'); return;}
  const type=document.getElementById("contractType").value;
  const stake=parseFloat(document.getElementById("stake").value)||1;
  const duration=parseInt(document.getElementById("duration").value)||1;

  ws.send(JSON.stringify({
    buy:1,
    price:stake,
    parameters:{
      contract_type:type,
      amount:stake,
      basis:"stake",
      symbol:activeSymbol,
      duration:duration,
      duration_unit:"m",
      currency:"USD"
    }
  }));
  showNotification(type+" trade requested!",'success');
}

// Chart.js
const ctx=document.getElementById("tradeChart").getContext("2d");
const tradeChart = new Chart(ctx,{type:"line",data:{labels:[],datasets:[{label:"Price",data:[],backgroundColor:"rgba(34,197,94,0.2)",borderColor:"rgba(34,197,94,1)",borderWidth:2} ]},options:{responsive:true,scales:{y:{beginAtZero:false}}}});

function updateChart(time,price){
  tradeChart.data.labels.push(time);
  tradeChart.data.datasets[0].data.push(price);
  if(tradeChart.data.labels.length>30){tradeChart.data.labels.shift(); tradeChart.data.datasets[0].data.shift();}
  tradeChart.update();
}

// Auto connect if token saved
const savedToken = localStorage.getItem("apiToken");
if(savedToken) connectDeriv(savedToken);

</script>
</body>
</html>
