<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/chart.css">

<!-- Chart Library -->
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<!-- TOP NAVIGATION -->

<header class="topbar">

<div class="logo">TradeBot</div>

<nav class="topnav">

<a href="#">Speedbot</a>
<a href="#">Chart</a>
<a href="#">Tradingview</a>
<a href="#">Trading Grid</a>

</nav>

<div class="auth">

<a href="#" onclick="login()">Log in</a>

<a href="#" onclick="signup()">Sign up</a>

<button onclick="enterApiToken()">API Token</button>

</div>

</header>



<!-- MAIN DASHBOARD -->

<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar">

<a href="#">Speedbot</a>
<a href="#">Chart</a>
<a href="#">Tradingview</a>
<a href="#">Trading Grid</a>

</div>



<!-- MAIN CONTENT -->

<div class="main-content">

<!-- CHART CARD -->

<div class="chart-card">

<div class="price-section">

<span id="price">940.518</span>

<span id="change">0.00%</span>

</div>

<!-- LIVE CHART -->

<div id="chart"></div>

<!-- PROBABILITY BARS -->

<div id="percentageBars"></div>

</div>



<!-- BOT CONTROL -->

<div class="bot-card">

<p id="botStatus">Bot is not running</p>

<button class="run-btn" onclick="startBot()">Run</button>

</div>



</div>

</div>



<!-- JAVASCRIPT FILES -->

<script src="js/chart.js"></script>

<script src="js/account.js"></script>

<script src="js/deriv.js"></script>

<script src="js/bot.js"></script>

</body>

</html>
