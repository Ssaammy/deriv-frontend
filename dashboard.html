<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradePro Dashboard</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:white;}
    .sidebar{width:220px;height:100vh;background:#020617;position:fixed;padding:20px;}
    .sidebar h2{color:#22c55e;margin-bottom:30px;}
    .sidebar a{display:block;margin:15px 0;color:white;text-decoration:none;}
    .main{margin-left:240px;padding:40px;}
    .card{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:20px;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
    #apiToken{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:none;}
    #connectTokenBtn, #buyBtn, #sellBtn{padding:10px 20px;background:#22c55e;border:none;border-radius:5px;color:white;cursor:pointer;margin-right:10px;}
    #chartContainer{background:#1e293b;border-radius:10px;padding:20px;margin-bottom:30px;}
    .notification{position:fixed;top:20px;right:20px;padding:15px;border-radius:5px;font-weight:bold;display:none;}
    .success{background:green;color:white;}
    .error{background:red;color:white;}
    @media(max-width:768px){.sidebar{width:100%;height:auto;position:relative;padding:15px;}.main{margin-left:0;padding:20px;}.grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<div class="sidebar">
  <h2>TradePro</h2>
  <a href="#">Dashboard</a>
  <a href="#">Trades</a>
  <a href="#">Statistics</a>
  <a href="#">Account</a>
</div>

<div class="main">
  <h1>Trading Dashboard</h1>

  <!-- API Token -->
  <div class="card">
    <h3>Connect Your Deriv Account</h3>
    <input type="text" id="apiToken" placeholder="Enter your Deriv API token">
    <button id="connectTokenBtn" onclick="saveToken()">Connect</button>
  </div>

  <!-- Buy / Sell -->
  <div class="card">
    <h3>Trade Controls</h3>
    <button id="buyBtn" onclick="openTrade('CALL')">Buy CALL</button>
    <button id="sellBtn" onclick="openTrade('PUT')">Buy PUT</button>
  </div>

  <!-- Stats -->
  <div class="grid">
    <div class="card"><h3>Total Trades</h3><p id="totalTrades">0</p></div>
    <div class="card"><h3>Win Rate</h3><p id="winRate">0%</p></div>
    <div class="card"><h3>Total Profit</h3><p id="profit">$0</p></div>
  </div>

  <!-- Recent Trades -->
  <div class="card">
    <h2>Recent Trades</h2>
    <div id="trades">No trades yet</div>
  </div>

  <!-- Live Chart -->
  <div id="chartContainer" class="card">
    <h2>Live Market Chart (R_100)</h2>
    <canvas id="tradeChart" width="400" height="200"></canvas>
  </div>
</div>

<!-- Notifications -->
<div id="notif" class="notification"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let ws;

function showNotification(message, type='success'){
  const notif = document.getElementById('notif');
  notif.innerText = message;
  notif.className = 'notification ' + (type==='success'?'success':'error');
  notif.style.display='block';
  setTimeout(()=>{notif.style.display='none';},3000);
}

// Save API token
function saveToken(){
  const token = document.getElementById("apiToken").value;
  if(token){
    localStorage.setItem("apiToken", token);
    showNotification("API token saved successfully!");
    fetchLiveMarketData(token);
  } else {
    showNotification("Please enter a valid API token", 'error');
  }
}

// Connect WebSocket
function connectDerivWebSocket(token){
  if(!token) return;

  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {
    console.log("Connected to Deriv WebSocket");
    ws.send(JSON.stringify({authorize: token}));
    ws.send(JSON.stringify({ticks: "R_100"}));
    ws.send(JSON.stringify({portfolio: 1}));
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if(data.tick){
      const price = data.tick.ask;
      const time = new Date(data.tick.epoch*1000).toLocaleTimeString();
      updateChart(time, price);
    }

    if(data.portfolio){
      const contracts = data.portfolio.contracts;
      let totalTrades = contracts.length;
      let wins = 0;
      let profit = 0;

      contracts.forEach(c => {
        if(c.profit !== undefined){
          profit += c.profit;
          if(c.profit > 0) wins++;
        }
      });

      const winRate = totalTrades > 0 ? ((wins/totalTrades)*100).toFixed(2) : 0;

      document.getElementById("totalTrades").innerText = totalTrades;
      document.getElementById("winRate").innerText = winRate + "%";
      document.getElementById("profit").innerText = "$" + profit.toFixed(2);

      const tradesDiv = document.getElementById("trades");
      tradesDiv.innerHTML = "";
      contracts.slice(-5).reverse().forEach(c => {
        const div = document.createElement("div");
        div.innerText = `${c.contract_type} | Stake: $${c.stake} | Profit: $${c.profit}`;
        tradesDiv.appendChild(div);
      });
    }
  };

  ws.onerror = (err) => {
    console.error("WebSocket error:", err);
    showNotification("WebSocket connection failed", 'error');
  };
}

// Trigger WebSocket if token exists
function fetchLiveMarketData(token){
  connectDerivWebSocket(token);
}

// Chart.js
const ctx = document.getElementById('tradeChart').getContext('2d');
const tradeChart = new Chart(ctx,{type:'line',data:{labels:[],datasets:[{label:'R_100 Price',data:[],backgroundColor:'rgba(34,197,94,0.2)',borderColor:'rgba(34,197,94,1)',borderWidth:2}]},options:{responsive:true,scales:{y:{beginAtZero:false}}}});
function updateChart(time, price){
  tradeChart.data.labels.push(time);
  tradeChart.data.datasets[0].data.push(price);
  if(tradeChart.data.labels.length>30){
    tradeChart.data.labels.shift();
    tradeChart.data.datasets[0].data.shift();
  }
  tradeChart.update();
}

// Buy/Sell trades
function openTrade(type){
  const token = localStorage.getItem("apiToken");
  if(!token){
    showNotification("Please connect your API token first", 'error');
    return;
  }
  if(!ws || ws.readyState!==1){
    showNotification("WebSocket not connected", 'error');
    return;
  }

  // Example: stake $1, duration 60 sec
  ws.send(JSON.stringify({
    buy: 1,
    price: 1,
    parameters: {
      contract_type: type,
      amount: 1,
      basis: "stake",
      symbol: "R_100",
      duration: 1,
      duration_unit: "m",
      currency: "USD"
    }
  }));

  showNotification(type + " trade requested!", 'success');
}

// Auto-connect if token saved
const savedToken = localStorage.getItem("apiToken");
if(savedToken) fetchLiveMarketData(savedToken);

</script>
</body>
</html>
